---
layout: default
---
    <section class="max-w-6xl mx-auto px-8 md:px-12 pt-16 md:pt-4 border-b-4 border-current pb-6">
        <span class="text-sm font-mono opacity-50 uppercase tracking-widest mb-4 block">Browsing Topic</span>
        <h1 class="text-6xl md:text-6xl font-black uppercase tracking-tighter leading-none">{{ page.title }}</h1>
    </section>
{% for post in site.categories[page.category] %}
            <article class="group pb-3">
                <time class="text-sm font-mono opacity-50 block mb-4">{{ post.date | date_to_string }}</time>
                <a href="{{ post.url }}">
                    <h2 class="text-3xl md:text-3xl font-black uppercase tracking-tight group-hover:italic transition-all">
                        {{ post.title }}
                    </h2>
                </a>
                <p class="mt-6 text-xl opacity-80 line-clamp-2">
                    {% assign stripped_content = post.content | strip_html %}
                    {{ stripped_content | truncatewords: 30 }}
                </p>
            </article>
{% endfor %}
