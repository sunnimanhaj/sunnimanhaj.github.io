<div class="breadcrumbs text-sm mb-5">
  <ul>
    <li><a href="{{ site.url }}">Home</a></li>
    <li>{{ page.title }}</li>
  </ul>
</div>
<h3>Posts in <b>{{ page.title }}</b></h3>
<ul>
  {% for post in site.categories[page.category] %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a> ({{ post.date | date_to_string }})
    </li>
  {% endfor %}
</ul>
