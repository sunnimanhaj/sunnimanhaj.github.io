---
layout: default
---
<section class="max-w-6xl mx-auto px-8 md:px-12 pt-16 md:pt-4 border-b-4 border-current pb-6">
    <span class="text-sm font-mono opacity-50 uppercase tracking-widest mb-4 block">Browsing Topic</span>
    <h1 class="text-6xl md:text-6xl font-black uppercase tracking-tighter leading-none">{{ page.title }}</h1>
</section>

<div id="post-wrapper" class="space-y-16 mt-12">
    {% for post in site.categories[page.category] %}
    <article class="post-item group pb-3 border-b border-current border-opacity-5 last:border-0">
        <time class="text-sm font-mono opacity-50 block mb-4">{{ post.date | date_to_string }}</time>
        <a href="{{ post.url }}">
            <h2 class="text-3xl md:text-3xl font-black uppercase tracking-tight group-hover:italic transition-all">
                {{ post.title }}
            </h2>
        </a>
        <p class="mt-6 text-xl opacity-80 line-clamp-2">
            {% assign stripped_content = post.content | strip_html %}
            {{ stripped_content | truncatewords: 30 }}
        </p>
    </article>
    {% endfor %}
</div>

<nav id="pagination-controls" class="flex justify-between items-center mt-20 pt-10 border-t-4 border-current">
    <button id="prev-page" class="text-xl font-black uppercase hover:italic disabled:opacity-20 disabled:cursor-not-allowed">← Previous</button>
    <span id="page-indicator" class="text-xs font-mono uppercase tracking-widest opacity-50">Page 1 of 1</span>
    <button id="next-page" class="text-xl font-black uppercase hover:italic disabled:opacity-20 disabled:cursor-not-allowed">Next →</button>
</nav>
