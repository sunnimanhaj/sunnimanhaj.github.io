<!DOCTYPE html>
<html lang="en" class="h-full" data-theme="light">
<head>
{% include meta.html %} 
</head>
<body role="document" itemscope itemtype="https://schema.org/WebPage" class="min-h-screen bg-base-100 text-base-content">
{% include header.html %} 
    <main class="max-w-6xl w-full mx-auto p-8 md:p-12">
     {{ content }}
    </main>
 {% include footer.html %} 
    <script src="https://unpkg.com/simple-jekyll-search@latest/dest/simple-jekyll-search.min.js"></script>
     <script>
        const toggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        if (html.getAttribute('data-theme') === 'black') { toggle.checked = true; }
        toggle.addEventListener('change', () => {
            const newTheme = toggle.checked ? 'black' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
<script>
  SimpleJekyllSearch({
    searchInput: document.getElementById('search-input'),
    resultsContainer: document.getElementById('results-container'),
    json: '/search.json'
  })
</script>
</body>
</html>
