<script>
document.addEventListener("DOMContentLoaded", function() {
    const postsPerPage = 5; // Change this to your preference
    const postWrapper = document.getElementById('post-wrapper');
    const posts = Array.from(postWrapper.getElementsByClassName('post-item'));
    const totalPages = Math.ceil(posts.length / postsPerPage);
    let currentPage = 1;

    const prevBtn = document.getElementById('prev-page');
    const nextBtn = document.getElementById('next-page');
    const indicator = document.getElementById('page-indicator');

    function updatePagination() {
        // Hide all posts
        posts.forEach(post => post.style.display = 'none');

        // Show posts for current page
        const start = (currentPage - 1) * postsPerPage;
        const end = start + postsPerPage;
        posts.slice(start, end).forEach(post => post.style.display = 'block');

        // Update UI
        indicator.innerText = `Manuscript ${currentPage} of ${totalPages}`;
        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;

        // Scroll to top of list smoothly
        if (currentPage > 1) {
            postWrapper.scrollIntoView({ behavior: 'smooth' });
        }
    }

    prevBtn.addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            updatePagination();
        }
    });

    nextBtn.addEventListener('click', () => {
        if (currentPage < totalPages) {
            currentPage++;
            updatePagination();
        }
    });

    // Initialize
    if (posts.length <= postsPerPage) {
        document.getElementById('pagination-controls').style.display = 'none';
    } else {
        updatePagination();
    }
});
</script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('results-container');
    const resultsMeta = document.getElementById('results-meta');
    const resultsCount = document.getElementById('results-count');

    let searchData = [];

function checkUrlAndSearch() {
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q');
        if (query) {
            const decodedQuery = decodeURIComponent(query);
            searchInput.value = decodedQuery;
            // We wait until searchData is loaded to perform the search
            if (searchData.length > 0) {
                performSearch(decodedQuery.toLowerCase());
            }
        }
    }
    
    // Fetch the JSON data
    fetch('{{ "/search.json" | relative_url }}')
        .then(response => response.json())
        .then(data => {
            searchData = data;
            
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            if (query) {
                searchInput.value = query;
                performSearch(query);
            }
        });

    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        performSearch(query);
        
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?q=' + encodeURIComponent(query);
        window.history.pushState({path:newUrl},'',newUrl);
    });

    function performSearch(query) {
        if (query.length < 2) {
            resultsContainer.innerHTML = '';
            resultsMeta.classList.add('hidden');
            return;
        }

        const matches = searchData.filter(post => {
            return (
                post.title.toLowerCase().includes(query) ||
                post.category.toLowerCase().includes(query) ||
                post.tags.toLowerCase().includes(query) ||
                post.author.toLowerCase().includes(query)
            );
        });

        displayResults(matches);
    }

    function displayResults(results) {
        resultsContainer.innerHTML = '';
        resultsMeta.classList.remove('hidden');
        resultsCount.innerText = results.length;

        if (results.length === 0) {
            resultsContainer.innerHTML = '<p class="italic opacity-30 text-xl font-mono uppercase">No manuscripts matching that criteria.</p>';
            return;
        }

        results.forEach(post => {
            const html = `
                <article class="group border-b border-current border-opacity-5 pb-3 transition-all">
                    <div class="flex justify-between items-baseline mb-2">
                        <span class="text-[10px] font-mono opacity-40 uppercase tracking-widest">${post.category} // ${post.author}</span>
                        <span class="text-[10px] font-mono opacity-20 uppercase">${post.date}</span>
                    </div>
                    <a href="${post.url}">
                        <h2 class="text-3xl md:text-3xl font-black uppercase tracking-tighter group-hover:italic transition-all leading-none">
                            ${post.title}
                        </h2>
                    </a>
                    ${post.hijri ? `<p class="mt-2 text-[9px] font-mono opacity-30 uppercase tracking-[0.2em] italic">${post.hijri}</p>` : ''}
                </article>
            `;
            resultsContainer.insertAdjacentHTML('beforeend', html);
        });
    }
});
</script>
