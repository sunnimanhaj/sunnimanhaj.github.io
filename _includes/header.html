<!-- Header / Blog Hero -->
<div class="drawer drawer-end">
  <input id="mobile-drawer" type="checkbox" class="drawer-toggle" />
  
  <div class="drawer-content flex flex-col">
    <header class="sticky top-0 z-50 bg-base-100 border-b-2 border-current">
        <nav class="max-w-6xl mx-auto flex justify-between items-center px-8 py-4">
            
            <div class="flex items-baseline gap-6">
                <a href="{{ site.url }}" class="text-2xl font-black tracking-tighter uppercase hover:italic transition-all">
                    {{ site.title }}.
                </a>
                <span class="hidden lg:block font-mono uppercase opacity-40 tracking-widest border-l-2 border-current pl-6">
                    {% if page.date %}{% else %}{{ page.title }}{% endif %}
                </span>
            </div>

            <div class="flex items-center gap-8">
                <ul class="hidden md:flex items-center gap-6 text-xs font-black uppercase tracking-widest">
                    <li><a href="{{ site.url }}" class="hover:italic transition-all">Index</a></li>
                    <li><a href="https://alsalafiyyah.github.io/" target="_blank" class="hover:italic transition-all">Fatwas</a></li>
                    <li><a href="/search" class="hover:italic transition-all">Search</a></li>
                    <li><a href="/write" class="hover:italic transition-all">Write</a></li>
                    <li><a href="/contact" class="hover:italic transition-all">Contact</a></li>
                    <li><a href="https://alsalafiyyah.github.io/quran/" target="_blank" class="hover:italic transition-all">Al-Qur'an</a></li>
                </ul>

                <div class="flex items-center gap-2">
                    <label class="swap swap-rotate btn btn-sm btn-ghost btn-circle border border-current hover:bg-base-content hover:text-base-100 transition-colors">
                        <input type="checkbox" id="theme-toggle" />
                        <svg class="swap-on fill-current w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/></svg>
                        <svg class="swap-off fill-current w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.69Z"/></svg>
                    </label>

                    <label for="mobile-drawer" class="md:hidden btn btn-sm btn-ghost btn-circle border border-current hover:bg-base-content hover:text-base-100 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </label>
                </div>
            </div>
        </nav>
    </header>
  </div> 

  <div class="drawer-side z-[100]">
    <label for="mobile-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
    <ul class="menu p-8 w-80 min-h-full bg-base-100 text-base-content border-l-4 border-current space-y-8 uppercase font-black tracking-tighter text-3xl">
      <li class="flex items-end mb-10">
          <label for="mobile-drawer" class="btn btn-outline border-2 border-current rounded-none font-black uppercase">CLOSE</label>
      </li>
      <li><a href="{{ site.url }}" class="hover:italic transition-all">Index</a></li>
      <li><a href="https://alsalafiyyah.github.io/" target="_blank" class="hover:italic transition-all">Fatwas</a></li>
      <li><a href="/search" class="hover:italic transition-all">Search</a></li>
      <li><a href="/write" class="hover:italic transition-all">Write</a></li>
      <li><a href="/contact" class="hover:italic transition-all">Contact</a></li>
      <li><a href="https://alsalafiyyah.github.io/quran/" target="_blank" class="hover:italic transition-all">Al-Qur'an</a></li>
      <div class="pt-20">
          <p class="text-[10px] font-mono tracking-widest opacity-40 leading-tight normal-case">
              {{ site.desc }}
          </p>
      </div>
    </ul>
  </div>
</div>
