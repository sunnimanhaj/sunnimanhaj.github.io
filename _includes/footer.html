<footer class="max-w-6xl mx-auto w-full px-8 md:px-12 mt-20 mb-12">
    <div class="border-t-2 border-current pt-10">
        
        <div class="flex flex-col md:flex-row justify-between items-start gap-8">
            
            <div class="max-w-2xl">
                <div class="flex items-center gap-4 mb-4">
                    <span class="text-2xl font-black uppercase tracking-tighter">{{ site.title }}.</span>
                    <span class="h-4 w-[2px] bg-current opacity-20"></span>
                    <span class="text-[9px] font-mono uppercase opacity-40 tracking-[0.2em]">{{ "now" | date: "%Y" }}</span>
                </div>
                
                <p class="text-[11px] md:text-xs font-mono uppercase tracking-widest opacity-60 leading-relaxed">
                    {{ site. desc }}
                </p>
            </div>

            <div class="flex items-center self-end md:self-start">
                <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" 
                        class="text-xs font-black uppercase tracking-[0.2em] hover:italic transition-all flex items-center gap-2 group">
                    Back to Top 
                    <span class="group-hover:-translate-y-1 transition-transform inline-block">↑</span>
                </button>
            </div>
        </div>
        
    </div>
</footer>
