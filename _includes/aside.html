
        <aside class="lg:col-span-1">
         <div class="sticky top-12 space-y-12">
            <div>
                <h3 class="text-sm font-black uppercase tracking-[0.2em] mb-6 border-b-2 border-current pb-2">Topics</h3>
                <div class="flex flex-wrap gap-2">
                    {% for category in site.categories %}
                    {% capture category_name %}{{ category | first }}{% endcapture %}
                    <a href="/category/{{ category_name | slugify }}" class="px-4 py-2 border-2 border-current font-bold uppercase text-xs hover:bg-base-content hover:text-base-100 transition-all">{{ category_name[0] }} ({{ category_name[1].size }})</a>
                    {% endfor %}
                </div>
            </div>
                 
         </div>
        </aside>
