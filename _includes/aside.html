
        <aside class="lg:col-span-1">
         <div class="sticky top-12 space-y-12">
            <div>
                <h3 class="text-sm font-black uppercase tracking-[0.2em] mb-6 border-b-2 border-current pb-2">Clickable Things</h3>
                <div class="flex flex-wrap gap-2">
                    {% for category in site.categories %}
                    {% capture category_name %}{{ category | first }}{% endcapture %}
                    <a href="/category/{{ category_name | slugify }}" class="px-4 py-2 border-2 border-current font-bold uppercase text-xs hover:bg-base-content hover:text-base-100 transition-all">{{ category_name }}</a>
                    {% endfor %}
                </div>
            </div>

            <div>
                <h3 class="text-sm font-black uppercase tracking-[0.2em] mb-6 border-b-2 border-current pb-2">Find Something I Hid.</h3>
                <div class="space-y-4">
                <form action="{{ '/find' | relative_url }}" method="get">
                    <input name="q" type="text" placeholder="Search" class="w-full bg-transparent border-2 border-current p-3 font-bold uppercase text-sm focus:outline-none placeholder:opacity-30" />
                    <button type="submit" class="w-full py-3 bg-base-content text-base-100 font-black uppercase text-sm hover:italic transition-all">Find</button>
                </form>
                </div>
            </div>
         </div>
        </aside>
