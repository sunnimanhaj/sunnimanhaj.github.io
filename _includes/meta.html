<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="MobileOptimized" content="320" />
<meta name="generator" content="Jekyll v{{ jekyll.version }}" />
<meta name="HandheldFriendly" content="True">
<meta name='date' content='{{ site.time }}'>
{% if page.url =='/' %}
<link rel="canonical" href="{{ site.url }}" />
<link rel='shortlink' href='{{ site.url }}'>
{% else %}
<link rel="canonical" href="{{ page.url | absolute_url }}" />
<link rel='shortlink' href='{{ page.url | absolute_url }}'>
{% endif %}
{% if page.title %}
<title>{{ page.title | escape }}</title>
{% elsif post.title %}
<title>{{ post.title | escape }}</title>
{% else %}
<title>{{ site.title | escape | default: 'Sunni Manhaj' }}</title>
{% endif %}
<meta name="directory" content="submission">
<meta name="news_keywords" content="{{ site.keywords }}">
<meta name="keywords" content="{{ site.keywords }}"/>
<meta name="author" content="{{ site.author }}">
<meta name="theme-color" content="Canvas">
<meta name='coverage' content='Worldwide'>
<meta name='distribution' content='Global'>
<meta name='rating' content='General'>
<meta name='revisit-after' content='3 days'>
<meta name='subtitle' content='Ahlus-Sunnah Manhaj'>
<meta name='target' content='all'>
<meta name='identifier-URL' content='{{ site.url }}'>
<meta name='directory' content='submission'>
<meta itemprop='name' content='{{ site.title }}'>
<meta name='url' content='{{ site.url }}'>
<meta name='robots' content='index,follow'>
<meta name="title" content="{% if page.title %}{{ page.title | escape }}{% elsif post.title %}{{ post.title | escape }}{% else %}{{ site.title | escape | default: 'Sunni Manhaj' }}{% endif %}">
<meta name='abstract' content='{% if page.excerpt %}{{ page.excerpt }}{% else %}{{ site.description }}{% endif %}'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const savedTheme = localStorage.getItem('theme');
        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'black' : 'light';
        const initialTheme = savedTheme || systemTheme;
        document.documentElement.setAttribute('data-theme', initialTheme);
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        html, body { transition: background-color 0.3s ease, color 0.3s ease; }
        .prose-custom p { margin-bottom: 2rem; line-height: 1.6; font-size: 1.25rem; }
        .glitch:hover {
            text-shadow: 4px 0px 0px rgba(128, 128, 128, 0.5);
            transform: skewX(-5deg);
        }
        /* Search */
        .search-input:focus {
            background-color: var(--fallback-bc,oklch(var(--bc)/1));
            color: var(--fallback-b1,oklch(var(--b1)/1));
            outline: none;
        }
    </style>
