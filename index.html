---
layout: default
---
  <!-- Header / Blog Hero -->
  <header class="relative overflow-hidden bg-gradient-to-r from-amber-50 via-stone-50 to-orange-50 border-b border-amber-200/40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8 md:py-12">
      <div class="text-center md:text-left md:flex md:justify-between md:items-end gap-6">
        <div>
          <div class="inline-flex items-center gap-2 bg-white/70 backdrop-blur-sm rounded-full px-4 py-1.5 shadow-sm border border-amber-200/60 mb-3">
            <i class="fas fa-globe-asia text-amber-600 text-sm"></i>
            <span class="text-xs font-medium text-stone-700 tracking-wide">Menu</span>
          </div>
          <h1 class="text-4xl md:text-5xl font-bold tracking-tight bg-gradient-to-r from-stone-800 to-amber-800 bg-clip-text text-transparent">
            {{ site.title }} <span class="font-serif-alt italic">Quotes</span>
          </h1>
          <p class="text-stone-600 mt-2 max-w-xl text-base">{{ site.desc }}</p>
        </div>
      </div>
    </div>
    <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-transparent via-amber-400 to-transparent"></div>
  </header>

<div class="lg:py-0 sm:py-32">
  <div class="mx-auto max-w-7xl px-1 lg:px-1">
    
    <div class="mx-auto max-w-2xl lg:mx-0">
      <h2 class="text-4xl font-semibold tracking-tight text-pretty text-gray-900 sm:text-5xl">{{ site.title }}</h2>
      <p class="mt-2 text-lg/8 text-gray-600">{{ site.desc }}</p>
    </div>
    
    <div class="mx-auto mt-10 grid max-w-2xl grid-cols-1 gap-x-8 gap-y-16 border-t border-gray-200 pt-10 sm:mt-16 sm:pt-16 lg:mx-0 lg:max-w-none lg:grid-cols-3">
      {% for post in paginator.posts %}
      <article class="flex max-w-xl flex-col items-start justify-between">
        <div class="flex items-center gap-x-4 text-xs">
          <time datetime="{{ post.date }}" class="text-gray-500">{{ post.date | date: "%b %d, %Y" }}</time>
          <a href="/category/{{ post.category }}" class="relative z-10 rounded-full bg-gray-50 px-3 py-1.5 font-medium text-gray-600 hover:bg-gray-100">{{ post.category }}</a>
        </div>
        <div class="group relative grow">
          <h3 class="mt-3 text-lg/6 font-semibold text-gray-900 group-hover:text-gray-600">
            <a href="{{ post.url }}">
              <span class="absolute inset-0"></span>
              {{ post.title }}
            </a>
          </h3>
          <p class="mt-5 line-clamp-3 text-sm/6 text-gray-600">{{ post.content }}</p>
        </div>
        <div class="relative mt-8 flex items-center gap-x-4 justify-self-end">
          <div class="text-sm/6">
            <p class="font-semibold text-gray-900">
              <a href="#">
                <span class="absolute inset-0"></span>
                {{ post.author }}
              </a>
            </p>
          </div>
        </div>
      </article>
      {% endfor %}
    </div>
  </div>
</div>
