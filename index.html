---
layout: default
---

<div class="lg:py-0 sm:py-32">
  <div class="mx-auto max-w-7xl px-1 lg:px-1">
    
    <div class="mx-auto mt-10 grid max-w-2xl grid-cols-1 gap-x-8 gap-y-16 pt-1 sm:mt-16 sm:pt-16 lg:mx-0 lg:max-w-none lg:grid-cols-3">
      {% for post in paginator.posts %}
      <article class="flex max-w-xl flex-col items-start justify-between">
        <div class="flex items-center gap-x-4 text-xs">
          <time datetime="{{ post.date }}" class="text-gray-500">{{ post.date | date: "%b %d, %Y" }}</time>
          <a href="/category/{{ post.category }}" class="relative z-10 rounded-full bg-gray-50 px-3 py-1.5 font-medium text-gray-600 hover:bg-gray-100">{{ post.category }}</a>
        </div>
        <div class="group relative grow">
          <h3 class="mt-3 text-lg/6 font-semibold text-gray-900 group-hover:text-gray-600">
            <a href="{{ post.url }}">
              <span class="absolute inset-0"></span>
              {{ post.title }}
            </a>
          </h3>
          <p class="mt-5 line-clamp-3 text-sm/6 text-gray-600">{{ post.content }}</p>
        </div>
        <div class="relative mt-8 flex items-center gap-x-4 justify-self-end">
          <div class="text-sm/6">
            <p class="font-semibold text-gray-900">
              <a href="#">
                <span class="absolute inset-0"></span>
                {{ post.author }}
              </a>
            </p>
          </div>
        </div>
      </article>
      {% endfor %}
    </div>
  </div>
</div>
