--- 
layout: no_sidebar
title: Contact
permalink: /contact/
---

<div id="toast-container" class="toast toast-end toast-bottom z-[100]"></div>

<div class="max-w-6xl w-full mx-auto p-8 md:p-12 grid grid-cols-1 lg:grid-cols-2 gap-16 flex-grow items-start">
    <section>
        <h1 class="text-3xl sm:text-3xl md:text-8xl lg:text-9xl xl:text-[10rem] font-black uppercase tracking-tighter leading-[0.8] mb-12 break-words">
            Get In Touch.
        </h1>
        <div class="space-y-8">
            <div>
                <h3 class="text-sm font-black uppercase tracking-widest border-b border-current pb-2 mb-4 inline-block">Direct Email</h3>
                <p class="text-2xl font-bold uppercase hover:italic transition-all cursor-pointer">INFO@</p>
            </div>
            <div>
                <h3 class="text-sm font-black uppercase tracking-widest border-b border-current pb-2 mb-4 inline-block">Info</h3>
                <p class="text-xl font-medium uppercase leading-tight opacity-70">
                    This page is currently on a coffee break.
                </p>
            </div>
        </div>
    </section>

    <section class="p-8 border-4 border-current">
        <form id="contact-form" method="POST" class="space-y-8">
            <div class="group">
                <label class="block text-sm font-black uppercase mb-2 tracking-widest">Full Name</label>
                <input name="Name" type="text" placeholder="YOUR NAME" class="w-full bg-transparent border-2 border-current p-4 font-bold uppercase placeholder:opacity-20 transition-all focus:placeholder:opacity-0" required />
            </div>

            <div class="group">
                <label class="block text-sm font-black uppercase mb-2 tracking-widest">Email Address</label>
                <input name="Email" type="email" placeholder="EMAIL@DOMAIN.COM" class="w-full bg-transparent border-2 border-current p-4 font-bold uppercase placeholder:opacity-20 transition-all focus:placeholder:opacity-0" required />
            </div>

            <div class="group">
                <label class="block text-sm font-black uppercase mb-2 tracking-widest">Message</label>
                <textarea name="Message" rows="5" placeholder="WRITE YOUR MESSAGE..." class="w-full bg-transparent border-2 border-current p-4 font-bold uppercase placeholder:opacity-20 transition-all focus:placeholder:opacity-0 resize-none" required></textarea>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-5 bg-base-content text-base-100 font-black uppercase text-xl hover:italic hover:tracking-[0.1em] transition-all duration-300 disabled:opacity-50">
                Send Message →
            </button>
        </form>
    </section>
</div>

<script>
  const form = document.getElementById('contact-form');
  const btn = document.getElementById('submit-btn');
  const toastContainer = document.getElementById('toast-container');

  // Helper function to show DaisyUI Snackbars
  function showToast(message, type = 'success') {
    const alertClass = type === 'success' ? 'alert-success' : 'alert-error';
    const toast = document.createElement('div');
    toast.className = `alert ${alertClass} shadow-lg font-bold uppercase rounded-none border-2 border-current`;
    toast.innerHTML = `<span>${message}</span>`;
    
    toastContainer.appendChild(toast);

    // Remove toast after 4 seconds
    setTimeout(() => {
      toast.classList.add('opacity-0', 'transition-opacity', 'duration-500');
      setTimeout(() => toast.remove(), 500);
    }, 4000);
  }

  form.addEventListener("submit", e => {
    e.preventDefault();
    btn.disabled = true;
    btn.innerText = "Sending...";

    fetch('https://script.google.com/macros/s/AKfycbyQIYQF8LbLoGOzXEMQXohJT9bEyF9Gq1eNVHCc7j1h57WUJDdMtLSCVVJTMRzeYAYC/exec', { 
        method: 'POST', 
        body: new FormData(form)
    })
    .then(response => {
        if(response.ok) {
            showToast("Message Sent Successfully!");
            form.reset();
        } else {
            throw new Error();
        }
    })
    .catch(error => {
        showToast("Error! Please try again later.", "error");
        console.error('Error!', error.message);
    })
    .finally(() => {
        btn.disabled = false;
        btn.innerText = "Send Message →";
    });
  });
</script>
