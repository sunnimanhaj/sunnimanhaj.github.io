--- 
layout: no_sidebar
title: Contact
permalink: /contact/
---
<div class="max-w-6xl w-full mx-auto p-8 md:p-12 grid grid-cols-1 lg:grid-cols-2 gap-16 flex-grow items-start">
        <section>
            <h1 class="text-4xl md:text-[10rem] font-black uppercase tracking-tighter leading-[0.8] mb-12">
                Get In <br> Touch.
            </h1>
            <div class="space-y-8">
                <div>
                    <h3 class="text-sm font-black uppercase tracking-widest border-b border-current pb-2 mb-4 inline-block">Direct Email</h3>
                    <p class="text-2xl font-bold uppercase hover:italic transition-all cursor-pointer">INFO@THESUNNIS</p>
                </div>
                <div>
                    <h3 class="text-sm font-black uppercase tracking-widest border-b border-current pb-2 mb-4 inline-block">Correspondence</h3>
                    <p class="text-xl font-medium uppercase leading-tight opacity-70">
                        
                    </p>
                </div>
            </div>
        </section>

        <section class="p-8 border-4 border-current">
            <form action="#" method="POST" class="space-y-8">
                <div class="group">
                    <label class="block text-sm font-black uppercase mb-2 tracking-widest">Full Name</label>
                    <input type="text" placeholder="YOUR NAME" class="w-full bg-transparent border-2 border-current p-4 font-bold uppercase placeholder:opacity-20 transition-all focus:placeholder:opacity-0" required />
                </div>

                <div class="group">
                    <label class="block text-sm font-black uppercase mb-2 tracking-widest">Email Address</label>
                    <input type="email" placeholder="EMAIL@DOMAIN.COM" class="w-full bg-transparent border-2 border-current p-4 font-bold uppercase placeholder:opacity-20 transition-all focus:placeholder:opacity-0" required />
                </div>

                <div class="group">
                    <label class="block text-sm font-black uppercase mb-2 tracking-widest">Message</label>
                    <textarea rows="5" placeholder="WRITE YOUR MESSAGE..." class="w-full bg-transparent border-2 border-current p-4 font-bold uppercase placeholder:opacity-20 transition-all focus:placeholder:opacity-0 resize-none" required></textarea>
                </div>

                <button type="submit" class="w-full py-5 bg-base-content text-base-100 font-black uppercase text-xl hover:italic hover:tracking-[0.1em] transition-all duration-300">
                    Send Message →
                </button>
            </form>
        </section>
            </div>
